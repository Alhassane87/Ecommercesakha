name: sakha
type: php

build:
  assets: build

env:
  prefix: LARAVEL_
  sync:
    - LOG_CHANNEL
    - APP_ENV

php: "8.2"

# ========== SERVICES - POSTGRESQL DATABASE ==========
services:
  postgres:
    type: postgres
    version: "16"
    plan: starter

processes:
  - web:
      commands:
        - "mkdir -p /tmp && php artisan octane:start --server=frankenphp --port=8000"
  - queue:
      commands:
        - "php artisan queue:work --max-jobs=1000 --max-time=3600"

variables:
  - name: APP_NAME
    default: "Sakha"
  - name: APP_ENV
    default: "production"
  - name: LOG_CHANNEL
    default: "stack"
  - name: APP_LOCALE
    default: "en"

deployment:
  on_deploy:
    - "php artisan migrate --force"
    - "php artisan db:seed --class=AdminUserSeeder"
    - "php artisan optimize:clear"
    - "php artisan config:cache"
    - "php artisan route:cache"
    - "php artisan view:cache"
    - "npm ci && npm run build"

healthchecks:
  - path: /
    expected_status: 200
